<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub - Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(120deg, #4facfe 0%, #00f2fe 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-wrapper {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .auth-wrapper h2 {
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }

        .auth-wrapper h2 span {
            color: #4facfe;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #4facfe;
            outline: none;
        }

        .input-row {
            display: flex;
            gap: 15px;
        }

        .input-row .input-group {
            flex: 1;
        }

        .terms {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            text-align: left;
        }

        .terms a {
            color: #4facfe;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-submit:hover {
            background-color: #00c6fb;
            transform: translateY(-2px);
        }

        .switch-link {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .switch-link a {
            color: #4facfe;
            font-weight: bold;
            text-decoration: none;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <h2>Learning <span>Hub</span></h2>
        <p class="subtitle">Create your account to start learning!</p>
        
        <form id="signupForm" onsubmit="return handleSignup(event)">
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create password" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm password" required>
                </div>
            </div>

            <div class="terms">
                <label>
                    <input type="checkbox" id="terms" required>
                    I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <p class="switch-link">
            Already have an account? <a href="login.html">Log In</a>
        </p>
    </div>

    <script>
        function handleSignup(event) {
            event.preventDefault();
            
            var fullname = document.getElementById('fullname').value;
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            // validation
            if(password !== confirmPassword) {
                alert("❌ Passwords do not match!");
                return false;
            }

            if(password.length < 6) {
                alert("❌ Password must be at least 6 characters!");
                return false;
            }

            // Demo - Aap yahan API call kar sakte hain
            if(fullname && email && password) {
                alert("🎉 Account Created Successfully! Welcome to Learning Hub.");
                // Yahan aap login page par redirect kar sakte hain
                // window.location.href = 'login.html';
            }
            return false;
        }
    </script>

</body>
</html>
