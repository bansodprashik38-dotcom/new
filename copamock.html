        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .btn { padding: 12px 20px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; width: 100%; }
        .btn:hover { background-color: #2980b9; }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-success { background-color: #2ecc71; margin-top: 15px;}
        .btn-success:hover { background-color: #27ae60; }
        
        #timer-bar { display: flex; justify-content: space-between; align-items: center; background: #e74c3c; color: white; padding: 15px; border-radius: 5px; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 100; margin-bottom: 20px;}
        .question-card { background: #fafafa; padding: 20px; border-left: 5px solid #3498db; margin-bottom: 15px; border-radius: 4px; }
        .question-card p { font-weight: bold; font-size: 16px; margin-top: 0; }
        .options label { display: block; padding: 8px; cursor: pointer; background: #fff; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 4px; }
        .options label:hover { background: #f1f1f1; }
        .options input { margin-right: 10px; }
        
        .result-box { text-align: center; padding: 30px; border: 2px dashed #bdc3c7; border-radius: 10px; margin-top: 20px; }
        .pass { color: #2ecc71; font-weight: bold; font-size: 24px; }
        .fail { color: #e74c3c; font-weight: bold; font-size: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #3498db; color: white; }

    // --- STATE VARIABLES ---
    let currentSet = 1;
    let timerInterval;
    let timeRemaining = 30 * 60; // 30 mins
    let userResults = {}; 

    // Initialize Dashboard
    window.onload = () => {
        const setContainer = document.getElementById("set-buttons");
        for (let i = 1; i <= 10; i++) {
            let btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = "Start Set " + i;
            
            if(!testData[i] || testData[i].length === 0) {
                btn.disabled = true;
                btn.innerText += " (Coming Soon)";
            } else {
                btn.onclick = () => startTest(i);
            }
            setContainer.appendChild(btn);
        }
    };

    // --- SMART BACK BUTTON LOGIC ---
    function smartBack() {
    clearInterval(timerInterval);
    window.history.back(); // Yeh command exact history back trigger karegi
}

    // --- CORE TEST LOGIC ---
    function startTest(setId) {
        currentSet = setId;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('test-view').style.display = 'block';
        document.getElementById('set-title').innerText = 'Set ' + setId;
        
        const qContainer = document.getElementById('questions-container');
        qContainer.innerHTML = '';
        
        testData[setId].forEach((qObj, index) => {
            let html = `<div class="question-card">
                <p>Q${index + 1}. ${qObj.q}</p>
                <div class="options">`;
            qObj.options.forEach((opt, optIndex) => {
                html += `<label><input type="radio" name="q${index}" value="${optIndex}"> ${opt}</label>`;
            });
            html += `</div></div>`;
            qContainer.innerHTML += html;
        });

        timeRemaining = 30 * 60;
        updateTimerDisplay();
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            if(timeRemaining <= 0) {
                clearInterval(timerInterval);
                manualSubmit();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(timeRemaining / 60);
        let seconds = timeRemaining % 60;
        document.getElementById('time-display').innerText = 
            (minutes < 10 ? '0' + minutes : minutes) + ':' + (seconds < 10 ? '0' + seconds : seconds);
    }

    function manualSubmit() {
        clearInterval(timerInterval);
        let score = 0;
        let total = testData[currentSet].length;
        
        testData[currentSet].forEach((qObj, index) => {
            let selected = document.querySelector(`input[name="q${index}"]:checked`);
            if(selected && parseInt(selected.value) === qObj.ans) {
                score++;
            }
        });
        
        userResults[currentSet] = { score: score, total: total };
        
        document.getElementById('test-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        
        let percentage = (score / total) * 100;
        let isPass = percentage >= 50;
        
        document.getElementById('result-details').innerHTML = `
            <h3>Set ${currentSet} Result</h3>
            <p style="font-size: 20px;">Score: <strong>${score} / ${total}</strong></p>
            <p style="font-size: 18px;">Percentage: <strong>${percentage.toFixed(1)}%</strong></p>
            <p class="${isPass ? 'pass' : 'fail'}">${isPass ? 'PASSED \u2714' : 'FAILED \u2718'}</p>
        `;
    }

    function returnToDashboard() {
        smartBack(); // Re-use the smart back function
    }

    function showOverallResult() {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('overall-view').style.display = 'block';
        
        let html = `<table>
            <tr>
                <th>Set No.</th>
                <th>Questions Count</th>
                <th>Score</th>
                <th>Status</th>
            </tr>`;
            
        for(let i = 1; i <= 10; i++) {
            if(userResults[i]) {
                let percentage = (userResults[i].score / userResults[i].total) * 100;
                let status = percentage >= 50 ? '<span class="pass">Pass</span>' : '<span class="fail">Fail</span>';
                html += `<tr>
                    <td>Set ${i}</td>
                    <td>${userResults[i].total}</td>
                    <td>${userResults[i].score} / ${userResults[i].total}</td>
                    <td>${status}</td>
                </tr>`;
            } else {
                let qCount = testData[i] ? testData[i].length : 0;
                html += `<tr>
                    <td>Set ${i}</td>
                    <td>${qCount}</td>
                    <td>Not Attempted</td>
                    <td>-</td>
                </tr>`;
            }
        }
        html += `</table>`;
        document.getElementById('overall-table-container').innerHTML = html;
    }
</script>
