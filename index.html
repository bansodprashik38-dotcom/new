<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub - Welcome</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========== BASE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0a0e27 0%, #111936 50%, #0a0e27 100%);
            overflow: hidden;
            position: relative;
        }

        /* ========== FLOATING BACKGROUND CIRCLES ========== */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: #00d4ff;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .circle-3 {
            width: 300px;
            height: 300px;
            background: #06b6d4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        .circle-4 {
            width: 200px;
            height: 200px;
            background: #f472b6;
            top: 20%;
            right: 20%;
            animation-delay: -7s;
            opacity: 0.2;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(40px, 20px) scale(1.02); }
        }

        /* ========== GLASSMORPHISM WELCOME BOX ========== */
        .welcome-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 580px;
            padding: 60px 50px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(0, 212, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            
            /* Entrance Animation */
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            animation: fadeInUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Border Glow Effect */
        .welcome-box::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 29px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.5), rgba(124, 58, 237, 0.3), rgba(0, 212, 255, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderGlow 3s ease-in-out infinite alternate;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes borderGlow {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        /* ========== CONTENT STYLES ========== */
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 5px;
            color: #00d4ff;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards 0.4s;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: #00d4ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d4ff;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .heading {
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #cfefff 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 4s linear infinite, fadeIn 0.6s ease forwards 0.6s;
            opacity: 0;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 40px;
            max-width: 90%;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards 0.8s;
        }

        .highlight {
            color: #22d3ee;
            font-weight: 600;
        }

        /* ========== BUTTON STYLES ========== */
        .btn-wrapper {
            margin-top: auto;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards 1s;
        }

        .enter-btn {
            display: inline-block;
            padding: 18px 55px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            background: linear-gradient(135deg, #0891b2 0%, #0284c7 50%, #0ea5e9 100%);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 10px 30px -10px rgba(2, 132, 199, 0.5),
                0 0 20px rgba(2, 132, 199, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        /* Hover Zoom Effect */
        .enter-btn:hover {
            transform: scale(1.08);
            background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 50%, #7dd3fc 100%);
            box-shadow: 
                0 15px 40px -10px rgba(14, 165, 233, 0.6),
                0 0 40px rgba(14, 165, 233, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* Button Active State */
        .enter-btn:active {
            transform: scale(1.02);
        }

        /* Shine Effect */
        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s ease;
        }

        .enter-btn:hover::before {
            left: 100%;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .welcome-box {
                padding: 45px 30px 35px;
            }
            
            .heading {
                font-size: 1.9rem;
            }
            
            .subtitle {
                font-size: 0.95rem;
            }
            
            .enter-btn {
                padding: 16px 40px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-shapes">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
    </div>

    <!-- Glassmorphism Welcome Box -->
    <div class="welcome-box">
        
        <!-- Logo -->
        <div class="logo">
            <span class="logo-dot"></span>
            Learning Hub
            <span class="logo-dot"></span>
        </div>

        <!-- Heading -->
        <h1 class="heading">Welcome To Smart Learning Hub</h1>

        <!-- Subtitle -->
        <p class="subtitle">
            Discover a new dimension of 
            Master technical skills through interactive quizzes, 
            comprehensive theory, and practicals.
        </p>

        <!-- Button -->
        <div class="btn-wrapper">
            <button class="enter-btn" onclick="enterHub()">
    ENTER LEARNING HUB
</button>
        </div>

    </div>

    <!-- JavaScript removed - button just has hover effects -->
<script>
function enterHub(){
    window.location.replace("login.html");
}
</script>
</body>
</html>
