<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COPA Study Material</title>
    <style>
        /* --- GENERAL STYLING --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative; /* Button positioning ke liye */
        }

        /* ---- NEW: Top Left Back Button Styling ---- */
        .back-wrapper {
            position: absolute;
            top: 25px;
            left: 30px;
            z-index: 10;
        }

        .back-btn-pro {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #0369a1; /* Aapke link text jaisa Dark Blue */
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .back-btn-pro:hover {
            background-color: #0284c7; /* Hover par Solid Blue */
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            transform: translateX(-5px); /* Left slide animation */
        }

        .back-btn-pro svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        /* --------------------------------------------- */

        /* Main Card Container (Aapki Image Ke Mutabiq) */
        .notes-card {
            background-color: #ffffff;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            padding: 20px;
            border: 1px solid #e1e4e8;
        }

        /* Card Main Title */
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* Section Headings (Trade Practical / Theory) */
        .section-heading {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 15px;
            margin-bottom: 10px;
            display: block;
        }

        /* Button/Link Layout */
        .doc-link {
            display: flex;
            align-items: center;
            background-color: #e0f2fe; /* Light blue background from image */
            color: #0369a1; /* Dark blue text */
            text-decoration: none;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid #bae6fd;
        }

        /* Hover Effect */
        .doc-link:hover {
            background-color: #0284c7; /* Solid blue on hover */
            color: #ffffff;
            border-color: #0284c7;
            transform: translateY(-1px);
        }

        /* Icon Spacer */
        .doc-link .icon {
            margin-right: 10px;
            font-size: 16px;
        }

        /* Divider Line */
        .section-divider {
            height: 1px;
            background-color: #f1f5f9;
            margin: 20px 0 10px 0;
            border: none;
        }
    </style>
</head>
<body>

            </svg>
            Back
        </a>
    </div>

    <div class="notes-card">
        
        <h2 class="card-title"> Course Materials</h2>

        <span class="section-heading">Trade Practical</span>

            <span class="icon">📄</span> COPA - Volume I of II (TP)
        </a>
        
        <a href="C:\Users\PB\OneDrive\Desktop\Prashik Bansod\HTML\Project\copa\COPA - Volume II of II - TP (NSQF 2022).pdf" target="_blank" class="doc-link">
            <span class="icon">📄</span> COPA - Volume II of II (TP)
        </a>


        <hr class="section-divider">


        <span class="section-heading">Trade Theory</span>

            <span class="icon">📘</span> COPA - Trade Theory (TT)
        </a>

    </div>

</body>
</html>
