        table { width: 100%; border-collapse: collapse; margin-top: 20px; }

            { q: "An electrical fire caused by a short circuit is best smothered using:", options: ["A) Sand", "B) Water", "C) A damp blanket", "D) Foam"], ans: 0 },
            { q: "What is the main application of a 'Grommet' in electrical enclosures?", options: ["A) To connect two wires", "B) To protect wires from being cut by the sharp edges of a metal hole", "C) To act as a heat sink", "D) To secure the panel door"], ans: 1 },
            { q: "The SI unit of electrical energy is the Joule. In commercial terms, 1 kilowatt-hour (kWh) equals:", options: ["A) 1,000 Joules", "B) 3,600 Joules", "C) 3,600,000 Joules", "D) 1,000,000 Joules"], ans: 2 }
        ]
    };

    // --- STATE VARIABLES ---
    let currentSet = 1;
    let timerInterval;
    let timeRemaining = 1800; // 30 mins * 60 seconds
    const totalQuestions = 25;
    let userResults = {}; 

    // --- INITIALIZATION ---
    window.onload = () => {
        const setContainer = document.getElementById("set-buttons");
        for (let i = 1; i <= 10; i++) {
            let btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = "Start Set " + i;
            
            // Disable sets that don't have questions yet 
            if(testData[i].length < 25) {
                btn.disabled = true;
                btn.innerText += " (Coming Soon)";
            }
            
            btn.onclick = () => startTest(i);
            setContainer.appendChild(btn);
        }
    };

    // --- TEST LOGIC ---
    function startTest(setNum) {
        currentSet = setNum;
        timeRemaining = 1800;
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("test-view").style.display = "block";
        document.getElementById("set-title").innerText = "Electrician Mock Test - Set " + setNum;
        
        renderQuestions();
        startTimer();
    }

    function renderQuestions() {
        const container = document.getElementById("questions-container");
        container.innerHTML = "";
        let questions = testData[currentSet];
        
        questions.forEach((qObj, index) => {
            let qDiv = document.createElement("div");
            qDiv.className = "question-card";
            
            let html = `<p>Q${index + 1}. ${qObj.q}</p><div class="options">`;
            qObj.options.forEach((opt, optIndex) => {
                html += `<label>
                            <input type="radio" name="q${index}" value="${optIndex}"> 
                            ${opt}
                         </label>`;
            });
            html += `</div>`;
            qDiv.innerHTML = html;
            container.appendChild(qDiv);
        });
    }

    // --- TIMER LOGIC ---
    function startTimer() {
        updateTimeDisplay();
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimeDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert("Time is up! Auto-submitting your test.");
                calculateScore();
            }
        }, 1000);
    }

    function updateTimeDisplay() {
        let minutes = Math.floor(timeRemaining / 60);
        let seconds = timeRemaining % 60;
        document.getElementById("time-display").innerText = 
            (minutes < 10 ? "0" : "") + minutes + ":" + 
            (seconds < 10 ? "0" : "") + seconds;
    }

    // --- SUBMISSION & GRADING ---
    function manualSubmit() {
        let answered = 0;
        for (let i = 0; i < totalQuestions; i++) {
            if (document.querySelector(`input[name="q${i}"]:checked`)) {
                answered++;
            }
        }
        
        if (answered < totalQuestions) {
            alert(`You have only answered ${answered} out of ${totalQuestions} questions. All questions are compulsory. Please answer the remaining questions.`);
            return;
        }

        let confirmSubmit = confirm("Are you sure you want to submit?");
        if (confirmSubmit) {
            clearInterval(timerInterval);
            calculateScore();
        }
    }

    function calculateScore() {
        let score = 0;
        let questions = testData[currentSet];
        
        for (let i = 0; i < totalQuestions; i++) {
            let selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected && parseInt(selected.value) === questions[i].ans) {
                score++;
            }
        }

        let percentage = (score / totalQuestions) * 100;
        let status = percentage >= 50 ? "PASS" : "FAIL";
        let statusClass = percentage >= 50 ? "pass" : "fail";

        userResults[currentSet] = { score: score, percent: percentage, status: status };

        document.getElementById("test-view").style.display = "none";
        document.getElementById("result-view").style.display = "block";
        
        document.getElementById("result-details").innerHTML = `
            <h3>Set ${currentSet} Result</h3>
            <p style="font-size: 20px;">Score: <strong>${score} / ${totalQuestions}</strong></p>
            <p style="font-size: 20px;">Percentage: <strong>${percentage}%</strong></p>
            <p class="${statusClass}">${status}</p>
        `;
        
        let btns = document.getElementById("set-buttons").getElementsByTagName("button");
        btns[currentSet - 1].innerText = `Set ${currentSet} - ${score}/25`;
        btns[currentSet - 1].style.backgroundColor = percentage >= 50 ? "#2ecc71" : "#e74c3c";
        btns[currentSet - 1].style.color = "white";
    }

    // --- NAVIGATION ---
    function returnToDashboard() {
        document.getElementById("result-view").style.display = "none";
        document.getElementById("overall-view").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    }

    function showOverallResult() {
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("overall-view").style.display = "block";
        
        let container = document.getElementById("overall-table-container");
        
        if (Object.keys(userResults).length === 0) {
            container.innerHTML = "<p style='text-align:center;'>No sets attempted yet.</p>";
            return;
        }

        let html = `<table>
            <tr>
                <th>Set No.</th>
                <th>Score (Out of 25)</th>
                <th>Percentage</th>
                <th>Result</th>
            </tr>`;
            
        let totalScore = 0;
        let attempted = 0;

        for (let i = 1; i <= 10; i++) {
            if (userResults[i]) {
                attempted++;
                totalScore += userResults[i].score;
                let statusColor = userResults[i].status === "PASS" ? "green" : "red";
                html += `<tr>
                    <td>Set ${i}</td>
                    <td>${userResults[i].score}</td>
                    <td>${userResults[i].percent}%</td>
                    <td style="color:${statusColor}; font-weight:bold;">${userResults[i].status}</td>
                </tr>`;
            }
        }
        
        let overallPercent = ((totalScore / (attempted * 25)) * 100).toFixed(2);
        let finalStatus = overallPercent >= 50 ? "PASS" : "FAIL";
        let finalColor = overallPercent >= 50 ? "green" : "red";

        html += `<tr style="background:#f1f1f1; font-weight:bold;">
            <td>OVERALL</td>
            <td>${totalScore} / ${attempted * 25}</td>
            <td>${overallPercent}%</td>
            <td style="color:${finalColor};">${finalStatus}</td>
        </tr></table>`;
        
        container.innerHTML = html;
    }
</script>
</body>
</html>
